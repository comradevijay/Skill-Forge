<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillForge — Online Learning Platform</title>
  <link rel="stylesheet" href="input.css">
  <link rel="stylesheet" href="output.css">
</head>

<body>
  <header id="header">
    <nav class="bg-black/30 backdrop-blur-md py-4 shadow-lg">
      <div class="nav-left">
        <img class="logo" src="img/logo.png" alt="Logo" />
        <ul class="nav-ul">
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#courses">Courses</a></li>
          <li><a href="#companies">Hiring Partners</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </div>
      <div class="login">
        <a id="login" href="#login">Login</a>
        <a id="register" href="#register">Register</a>
      </div>
    </nav>
  </header>

  <!-- Hero -->
  <section id="hero">

    <div class="hero-text-box">
      <div class="empower">
        <img src="img/icons/rocket.png" alt="rocket-icon" class="icon">
        <span id="icon">Empower Your Future</span>
      </div>

      <div class="hero-h">Master <span id="special"> Tech Skills,</span></div>
      <span class="hero-h">At Your Convinence</span>
      <div class="hero-p">
        <p>Learn programming, Web Development, Cloud computing, AI </p>
        <p>and more through industry-focused cources designed for</p>
        <p>real-world sucess.</p>
      </div>
      <div id="btn">
        <button type="submit" class="btn " id="btn-fill">Get Started <img src="img/icons/arrow.png" alt=""
            class="arrow"></button>
        <button type="submit" class="btn " id="btn-out">Explore Courses<img src="img/icons/arrow-blue.png" alt=""
            class="arrow"></button>
      </div>

    </div>



  </section>

  <!-- Stats -->
  <section id="stats"></section>

  <!-- Features -->
  <section id="features"></section>

  <!-- Details Form -->
  <section id="contact"></section>

  <!-- Footer -->
  <footer></footer>
</body>


</html>
